# .forge/manifest.yaml — railguey
# Project-scoped Railway CLI
# Generated by /forge-manifest-init on 2026-03-22

manifest_version: 1

repo:
  visibility: private  # Currently private — consider making public for FOSS
  org: eidos-agi
  topics: [railway, cli, deploy, devops, ci-cd]

packaging:
  build_system: hatchling
  pypi:
    name: railguey
    publish: true
    trusted_publisher:
      owner: eidos-agi
      repo: railguey
      workflow: publish.yml
      environment: pypi
  readme:
    absolute_images: true

quality:
  required_files:
    - LICENSE
    - README.md
    - CHANGELOG.md
    - CODE_OF_CONDUCT.md
    - CONTRIBUTING.md
    - SECURITY.md
  min_grade:
    foss_check: B
    ship_check: pass
    sec_audit: clean

security:
  secret_scanning: true
  dependency_audit: true
  git_history_scan: true

dependencies:
  max_count: 5

ci:
  workflows:
    ci: true
    publish: true
  permissions:
    contents_read: true
  pre_commit: true
  build_verification: true
