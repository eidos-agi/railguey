# Service Registry — Greenmark Waste Solutions
# Consumed by railguey orchestration tools (registry, preflight, verify, deploy_plan)
# See ADR-2026-08 for design rationale.
#
# This file is the single source of truth for what Greenmark runs, how it deploys,
# and what depends on what. If you're new, read the descriptions first.

registry_version: 1

org:
  name: greenmark
  github_org: greenmark-waste-solutions
  environment: production

defaults:
  preflight:
    require_clean_worktree: true
    require_ci_green: true
  verify:
    poll_interval_seconds: 10
    timeout_seconds: 900
    success_streak: 3
    log_tail_lines: 50
    fail_fast_patterns:
      - "Traceback (most recent call last)"
      - "UnhandledPromiseRejection"
      - "FATAL"
      - "panic:"
      - "ECONNREFUSED"
      - "BLOCKED:"

resources:
  supabase:
    project_ref: wwmcgtyngnziepeynccz
    owned_by: cerebro-migrations
    notes:
      - "ADR-2026-38: cerebro-migrations owns all medallion DDL"
      - "No service applies migrations on startup"

services:
  # ── Database schema (non-Railway deployable) ──────────────────────
  - name: cerebro-migrations
    description: >
      Database schema for all of Cerebro. Every table, view, index, and RLS
      policy lives here. This is not a running service — it's a collection of
      SQL migration files that get pushed to Supabase. 6 other services depend
      on this being up to date. If you change the schema, push migrations
      BEFORE deploying anything else.
    type: migrations
    repo: cerebro-migrations
    workspace: ~/repos-greenmark-waste-solutions/cerebro-migrations
    deploy:
      branch: main
      mode: supabase_push
      command: "npx supabase db push --linked"
    health:
      smoke:
        - kind: migration_status
          command: "npx supabase migration list --linked"
          expect: "all migrations synced (no local-only entries)"
    verify:
      timeout_seconds: 120

  # ── ETL worker ────────────────────────────────────────────────────
  - name: data-daemon
    description: >
      The extraction pipeline. Pulls data from vendor systems (Sage Intacct,
      HubSpot, Navusoft, etc.) into the bronze layer of the warehouse on a
      schedule. YAML-driven connectors, Postgres job queue, 82+ tests.
      Slow builds (~20 min) so verify timeout is extended to 1200s.
    type: railway_service
    repo: data-daemon
    workspace: ~/repos-greenmark-waste-solutions/data-daemon
    deploy:
      branch: develop
      mode: railway_github_autodeploy
    depends_on:
      - target: cerebro-migrations
        kind: database_schema
        gate: required_before_deploy
        why: "data-daemon writes to bronze tables that migrations create"
    ci:
      pre_commit: [pyright, pytest]
    health:
      http:
        path: /health
        expect_status: 200
      log_patterns:
        fail_fast:
          - "Traceback"
          - "SQLSTATE"
          - "BLOCKED:"
          - "connection refused"
    verify:
      timeout_seconds: 1200
      success_streak: 3

  # ── Next.js dashboard ─────────────────────────────────────────────
  - name: cerebro
    description: >
      The main executive dashboard. Next.js app that Michael, Alex, and Robert
      use daily. Shows financial data, CRM metrics, fleet status, and data
      quality scores. RBAC controls who sees what. This is the product.
    type: railway_service
    repo: cerebro
    workspace: ~/repos-greenmark-waste-solutions/cerebro
    deploy:
      branch: main
      mode: railway_github_autodeploy
    depends_on:
      - target: cerebro-migrations
        kind: database_schema
        gate: required_before_deploy
        why: "cerebro reads from gold/silver views that migrations create"
      - target: cerebro-ai-services
        kind: runtime_api
        gate: recommended_before_verify
        why: "AI features (chat, transcription) call this API — dashboard works without it but those features break"
    ci:
      pre_commit: [eslint, vitest]
    health:
      http:
        path: /
        expect_status: 200
    verify:
      timeout_seconds: 900

  # ── FastAPI AI services ───────────────────────────────────────────
  - name: cerebro-ai-services
    description: >
      Backend AI API that powers Cerebro's intelligent features — chat
      assistant, document transcription, and natural language queries.
      FastAPI + Claude. Cerebro calls this; it doesn't serve users directly.
    type: railway_service
    repo: cerebro-ai-services
    workspace: ~/repos-greenmark-waste-solutions/cerebro-ai-services
    deploy:
      branch: main
      mode: railway_github_autodeploy
    depends_on:
      - target: cerebro-migrations
        kind: database_schema
        gate: required_before_deploy
        why: "reads warehouse tables for RAG context and query results"
    ci:
      pre_commit: [pyright, pytest]
    health:
      http:
        path: /health
        expect_status: 200
    verify:
      timeout_seconds: 900

  # ── QA dashboard ──────────────────────────────────────────────────
  - name: cerebro-qa
    description: >
      Data quality monitoring dashboard. Runs automated checks against the
      warehouse (null rates, freshness, row counts, cross-source consistency)
      and surfaces issues before they reach the executive dashboard.
    type: railway_service
    repo: cerebro-qa
    workspace: ~/repos-greenmark-waste-solutions/cerebro-qa
    deploy:
      branch: main
      mode: railway_github_autodeploy
    depends_on:
      - target: cerebro-migrations
        kind: database_schema
        gate: required_before_deploy
        why: "QA checks reference bronze/silver/gold tables"
    ci:
      pre_commit: [pytest]
    health:
      http:
        path: /health
        expect_status: 200

  # ── Warp Speed (Claude Agent SDK) ─────────────────────────────────
  - name: cerebro-warp-speed
    description: >
      Conversational AI agent built on Claude Agent SDK. Connects to CRM,
      accounting, and fleet data via MCP tools. Used for natural language
      queries across all vendor systems. Experimental — not yet customer-facing.
    type: railway_service
    repo: cerebro-warp-speed
    workspace: ~/repos-greenmark-waste-solutions/cerebro-warp-speed
    deploy:
      branch: main
      mode: railway_manual_deploy
    depends_on:
      - target: cerebro-migrations
        kind: database_schema
        gate: recommended_before_verify
        why: "uses warehouse data for context but can fall back to local fixtures"
    ci:
      pre_commit: [pytest]
    health:
      http:
        path: /health
        expect_status: 200

  # ── Bot farm ──────────────────────────────────────────────────────
  - name: cerebro-bot-farm
    description: >
      Background worker pool for long-running AI tasks — report generation,
      bulk analysis, scheduled intelligence jobs. Pulls work from a queue
      and writes results back to the warehouse.
    type: railway_service
    repo: cerebro-bot-farm
    workspace: ~/repos-greenmark-waste-solutions/cerebro-bot-farm
    deploy:
      branch: main
      mode: railway_manual_deploy
    depends_on:
      - target: cerebro-migrations
        kind: database_schema
        gate: required_before_deploy
        why: "reads from and writes to warehouse tables"
    ci:
      pre_commit: [pytest]
    health:
      log_patterns:
        fail_fast:
          - "panic:"
          - "FATAL"

  # ── Astro website ─────────────────────────────────────────────────
  - name: gmw-dot-com
    description: >
      Public website for Greenmark Waste Solutions (greenmarkwaste.com).
      Astro 5 + Tailwind + nginx. Static site, no database dependency.
      Replacement for the old Webflow site. SEO-optimized.
    type: railway_service
    repo: gmw-dot-com-astro
    workspace: ~/repos-greenmark-waste-solutions/gmw-dot-com-astro
    deploy:
      branch: main
      mode: railway_github_autodeploy
    ci:
      pre_commit: [build]
    health:
      http:
        path: /
        expect_status: 200

  # ── Portal ────────────────────────────────────────────────────────
  - name: portal
    description: >
      Customer-facing portal for Greenmark clients. Allows customers to
      view invoices, request service changes, and access account information.
    type: railway_service
    repo: portal
    workspace: ~/repos-greenmark-waste-solutions/portal
    deploy:
      branch: main
      mode: railway_github_autodeploy
    ci:
      pre_commit: [build]
    health:
      http:
        path: /
        expect_status: 200

  # ── Vault (config store — no deploys) ─────────────────────────────
  - name: vault-simple
    description: >
      Not a real service. Empty Railway container used purely as a key-value
      store for environment variables and secrets that other services reference.
      Zero cost, never deploys, no code. Think of it as a shared config file
      that lives in Railway instead of git.
    type: railway_service
    repo: null
    workspace: null
    deploy:
      branch: null
      mode: none
